<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BaseMaster</title>
    <style>
      /* só background pro splash — cor do texto vem do CSS do app
         (senão esse color fixo vaza pra todos os textos em light mode). */
      html, body { background: #0a0a0a; margin: 0 }
      #root { min-height: 100vh }
      /* Splash: aparece de cara, React substitui ao montar. */
      .bm-splash {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #0a0a0a;
        z-index: 0;
      }
      .bm-splash-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }
      .bm-splash-logo {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: oklch(0.62 0.19 254);
        color: #0a0a0a;
        display: grid;
        place-items: center;
        font: 600 18px/1 system-ui, -apple-system, Segoe UI, sans-serif;
        box-shadow: 0 6px 24px rgba(0,0,0,0.35);
      }
      .bm-splash-spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255,255,255,0.18);
        border-top-color: oklch(0.62 0.19 254);
        border-radius: 50%;
        animation: bm-spin 0.7s linear infinite;
      }
      @keyframes bm-spin { to { transform: rotate(360deg) } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="bm-splash">
        <div class="bm-splash-inner">
          <div class="bm-splash-logo">BM</div>
          <div class="bm-splash-spinner"></div>
        </div>
      </div>
    </div>
    <!-- Portal target do Glide Data Grid (overlay de edição). -->
    <div id="portal" style="position: fixed; left: 0; top: 0; z-index: 9999;"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
